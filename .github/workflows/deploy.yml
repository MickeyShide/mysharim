name: Build & Deploy


on:
  push:
    branches: [main, test]

env:
  CONTAINER_BASE_NAME: mysharim

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lower case image name
        run: |
          IMAGE_PATH="ghcr.io/${{ github.repository_owner }}/mysharim"
          echo "IMAGE_NAME=$(echo "$IMAGE_PATH" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set deploy config
        id: deploy_config
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            CONTAINER_NAME="${{ env.CONTAINER_BASE_NAME }}"
            IMAGE_TAG="latest"
          elif [ "${GITHUB_REF_NAME}" = "test" ]; then
            CONTAINER_NAME="${{ env.CONTAINER_BASE_NAME }}-test"
            IMAGE_TAG="test"
          fi

          if [ -z "$CONTAINER_NAME" ] || [ -z "$IMAGE_TAG" ]; then
            echo "Deploy config is not configured for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          echo "container_name=$CONTAINER_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Validate deploy port
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            DEPLOY_PORT="${{ secrets.APP_PORT }}"
          elif [ "${GITHUB_REF_NAME}" = "test" ]; then
            DEPLOY_PORT="${{ secrets.TEST_APP_PORT }}"
          fi

          if [ -z "$DEPLOY_PORT" ]; then
            echo "Deploy port is not configured for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.deploy_config.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy main to server
        if: github.ref_name == 'main'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:${{ steps.deploy_config.outputs.image_tag }}
            docker stop ${{ steps.deploy_config.outputs.container_name }} || true
            docker rm   ${{ steps.deploy_config.outputs.container_name }} || true
            docker run -d \
              --name ${{ steps.deploy_config.outputs.container_name }} \
              --restart unless-stopped \
              -p ${{ secrets.APP_PORT }}:80 \
              ${{ env.IMAGE_NAME }}:${{ steps.deploy_config.outputs.image_tag }}
            docker image prune -f

      - name: Deploy test to server
        if: github.ref_name == 'test'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:${{ steps.deploy_config.outputs.image_tag }}
            docker stop ${{ steps.deploy_config.outputs.container_name }} || true
            docker rm   ${{ steps.deploy_config.outputs.container_name }} || true
            docker run -d \
              --name ${{ steps.deploy_config.outputs.container_name }} \
              --restart unless-stopped \
              -p ${{ secrets.TEST_APP_PORT }}:80 \
              ${{ env.IMAGE_NAME }}:${{ steps.deploy_config.outputs.image_tag }}
            docker image prune -f
